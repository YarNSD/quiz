<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ios-bg: #0b0b0f;
      --card-bg: rgba(255, 255, 255, 0.05);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--ios-bg);
      background-image: radial-gradient(circle at 50% -10%, #1a1a2e 0%, #0b0b0f 100%);
      color: #fff;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100vh;
    }

    .team-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      margin-bottom: 8px;
      border-radius: 16px;
      transition: transform 0.2s;
    }

    /* Стили для топ-3 */
    .rank-1 { 
      border-color: rgba(255, 215, 0, 0.4); 
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.15) 0%, rgba(255, 215, 0, 0.02) 100%);
    }
    .rank-2 { 
      border-color: rgba(192, 192, 192, 0.4); 
      background: linear-gradient(135deg, rgba(192, 192, 192, 0.15) 0%, rgba(192, 192, 192, 0.02) 100%);
    }
    .rank-3 { 
      border-color: rgba(205, 127, 50, 0.4); 
      background: linear-gradient(135deg, rgba(205, 127, 50, 0.15) 0%, rgba(205, 127, 50, 0.02) 100%);
    }

    .rounds-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); 
      gap: 6px;
    }

    .round-badge {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 6px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
    }

    .medal-icon {
      font-size: 24px;
      line-height: 1;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
    }

    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      z-index: 100;
      display: none;
      padding: 16px;
      align-items: center;
      justify-content: center;
    }

    .modal-open #modal-overlay { display: flex; }
    
    .answer-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
  </style>
</head>
<body class="p-3 pb-8">
  
  <header class="mb-4 mt-2 text-center">
    <h1 class="text-2xl font-black tracking-tighter italic uppercase text-white leading-none">
      LEADERBOARD
    </h1>
    <p id="status-tag" class="text-[9px] text-blue-400 font-bold uppercase tracking-[0.2em] mt-1 opacity-60">Live Syncing</p>
  </header>

  <div id="leaderboard" class="max-w-md mx-auto">
    <div class="text-center py-20 opacity-30 font-bold uppercase tracking-widest text-[10px] loading-pulse">
      Обновление данных...
    </div>
  </div>

  <!-- Модальное окно -->
  <div id="modal-overlay" onclick="closeModal()">
    <div class="bg-[#1c1c1e] w-full max-w-[340px] rounded-[32px] border border-white/10 overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
      <div class="p-5 border-b border-white/10 flex justify-between items-center bg-white/[0.02]">
        <div>
          <h2 id="modal-team-name" class="text-lg font-black uppercase text-white leading-tight truncate max-w-[200px]">Команда</h2>
          <p id="modal-round-name" class="text-[9px] text-blue-400 font-bold uppercase tracking-widest mt-0.5">Детали раунда</p>
        </div>
        <button onclick="closeModal()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-xs hover:bg-white/20">✕</button>
      </div>
      <div id="modal-body" class="p-5 text-sm max-h-[50vh] overflow-y-auto"></div>
      <div class="px-5 py-4 border-t border-white/10 bg-white/[0.04] flex justify-between items-center">
        <span class="text-gray-500 uppercase text-[9px] font-black tracking-widest">Итого за раунд</span>
        <div class="text-2xl font-black text-white" id="modal-total-round">0</div>
      </div>
    </div>
  </div>

  <script>
    function updateData() {
      const statusTag = document.getElementById('status-tag');
      google.script.run
        .withSuccessHandler(function(data) {
          renderLeaderboard(data);
          statusTag.innerText = 'Обновлено: ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        })
        .getLiveResults();
    }

    function renderLeaderboard(data) {
      const container = document.getElementById('leaderboard');
      if (!data) return;

      container.innerHTML = data.map((item, index) => {
        const rank = index + 1;
        let rankClass = '';
        let medal = '';
        
        if (rank === 1) { rankClass = 'rank-1'; medal = '🥇'; }
        else if (rank === 2) { rankClass = 'rank-2'; medal = '🥈'; }
        else if (rank === 3) { rankClass = 'rank-3'; medal = '🥉'; }
        else { medal = `<span class="text-xs opacity-30 font-black">#${rank}</span>`; }

        return `
          <div class="team-card p-3.5 ${rankClass}">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-3">
                <div class="w-8 flex justify-center items-center medal-icon">${medal}</div>
                <span class="font-black text-lg uppercase tracking-tight truncate max-w-[160px]">${item.name}</span>
              </div>
              <div class="text-2xl font-black ${rank <= 3 ? (rank === 1 ? 'text-yellow-400' : 'text-white') : 'text-white/90'}">
                ${item.score}
              </div>
            </div>
            <div class="rounds-grid">
              ${item.rounds.map(r => `
                <div onclick="openDetails('${item.name.replace(/'/g, "\\'")}', '${r.fullName}', '${r.name}', ${r.score})" class="round-badge active:scale-95 transition-transform">
                  <span class="text-[8px] text-white/40 font-bold mb-0.5 uppercase">${r.name}</span>
                  <span class="text-sm font-black">${r.score}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function openDetails(teamName, roundFullName, roundShortName, score) {
      document.getElementById('modal-team-name').innerText = teamName;
      document.getElementById('modal-round-name').innerText = roundFullName;
      document.getElementById('modal-total-round').innerText = score;
      document.getElementById('modal-body').innerHTML = '<div class="py-10 flex justify-center"><div class="w-5 h-5 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>';
      document.body.classList.add('modal-open');

      google.script.run
        .withSuccessHandler(renderQuestions)
        .getDetailedRoundData(teamName, roundFullName);
    }

    function renderQuestions(questions) {
      const body = document.getElementById('modal-body');
      if (!questions || questions.length === 0) {
        body.innerHTML = '<div class="text-center py-6 opacity-30 uppercase font-bold text-[10px]">Нет данных</div>';
        return;
      }

      body.innerHTML = questions.map(q => {
        const isBonus = q.num && q.num.toString().toLowerCase().includes('доп');
        const colorClass = q.correct ? 'text-green-400' : (isBonus ? 'text-blue-400' : 'text-white/20');
        const dotColor = q.correct ? 'bg-green-500' : (isBonus ? 'bg-blue-500' : 'bg-white/10');
        
        return `
          <div class="answer-item">
            <div class="flex items-center gap-3">
              <div class="w-1.5 h-1.5 rounded-full ${dotColor}"></div>
              <span class="font-bold text-white/80">${q.num}</span>
            </div>
            <div class="font-black ${colorClass}">${q.points || 0}</div>
          </div>
        `;
      }).join('');
    }

    function closeModal() { document.body.classList.remove('modal-open'); }

    window.onload = function() {
      updateData();
      setInterval(updateData, 15000);
    };
  </script>
</body>
</html>
